name: Lighthouse CI

# Déclenchement manuel uniquement : build + serveur de preview + 3 runs Lighthouse
# est plus coûteux qu'un simple lint/test et plus sensible au bruit d'un runner
# partagé. Voir QUALITY.md pour le détail des seuils.
on:
  workflow_dispatch: {}

jobs:
  lighthouse:
    name: Performance & accessibilité (perf >= 90, a11y >= 95)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + Lighthouse CI
        run: npm run lighthouse
